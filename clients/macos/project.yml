name: Spotuify
options:
  bundleIdPrefix: com.bhekanik
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.71"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO

targets:
  SpotuifyKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/SpotuifyKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bhekanik.spotuify.kit
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.71"

  Spotuify:
    type: application
    platform: macOS
    sources:
      - path: Sources/Spotuify
    dependencies:
      - target: SpotuifyKit
    info:
      path: Support/Info.plist
      properties:
        CFBundleDisplayName: Spotuify
        CFBundleName: Spotuify
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: "Copyright © 2026 Bhekani Khumalo"
        LSApplicationCategoryType: public.app-category.music
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bhekanik.spotuify
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES

  SpotuifyKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SpotuifyKitTests
    dependencies:
      - target: SpotuifyKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bhekanik.spotuify.kittests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Spotuify:
    build:
      targets:
        Spotuify: all
        SpotuifyKitTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      environmentVariables:
        SPOTUIFY_INSTANCE: spotuify-dev
        SPOTUIFY_MACOS_LIVE_DAEMON_TESTS: "0"
      targets:
        - SpotuifyKitTests

  SpotuifyLiveDaemon:
    build:
      targets:
        Spotuify: all
        SpotuifyKitTests: [test]
    test:
      config: Debug
      environmentVariables:
        SPOTUIFY_INSTANCE: spotuify-dev
        SPOTUIFY_MACOS_LIVE_DAEMON_TESTS: "1"
      targets:
        - SpotuifyKitTests
