name: Release

on:
  push:
    tags:
      - "v*"
  # Manual trigger can re-run an existing tag release. Select the tag ref
  # (for example `v0.1.0`) when dispatching.
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: spotuify

jobs:
  plan:
    name: Plan Release
    runs-on: ubuntu-latest
    outputs:
      cli_changed: ${{ steps.scope.outputs.cli_changed }}
      has_artifacts: ${{ steps.scope.outputs.has_artifacts }}
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
      - name: Validate release ref
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+(\.[0-9]+)* ]]; then
            echo "::error ::release workflow must run on a v* tag, got ${GITHUB_REF_NAME}"
            exit 1
          fi
      - id: previous-tag
        name: Find previous tag
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-version:refname | grep '^v' | grep -Fxv "${CURRENT_TAG}" | head -n1 || true)"
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
      - id: scope
        name: Detect changed artifact families
        run: bash ./scripts/release_change_scope.sh "${{ steps.previous-tag.outputs.previous_tag }}" "${GITHUB_REF_NAME}"
      - id: matrix
        name: Build release matrix
        run: |
          MATRIX='{"include":[
            {"os":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","platform_family":"linux","archive":"linux-x86_64.tar.gz","archive_kind":"tar","audio":"alsa-backend","extra_flags":"","apt_packages":"libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config","brew_packages":""},
            {"os":"macos-15","target":"aarch64-apple-darwin","platform_family":"macos","archive":"macos-aarch64.tar.gz","archive_kind":"tar","audio":"portaudio-backend","extra_flags":"","apt_packages":"","brew_packages":"portaudio pkg-config"},
            {"os":"macos-15-intel","target":"x86_64-apple-darwin","platform_family":"macos","archive":"macos-x86_64.tar.gz","archive_kind":"tar","audio":"portaudio-backend","extra_flags":"","apt_packages":"","brew_packages":"portaudio pkg-config"},
            {"os":"windows-2025","target":"x86_64-pc-windows-msvc","platform_family":"windows","archive":"windows-x86_64.zip","archive_kind":"zip","audio":"rodio-backend","extra_flags":"","apt_packages":"","brew_packages":""}
          ]}'
          {
            echo 'build_matrix<<EOF'
            echo "${MATRIX}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  release-smoke:
    name: Release CLI Smoke
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.cli_changed == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config
      - name: Run release-blocking CLI tests
        run: scripts/cargo-test --test cli_help --test cli_fake_daemon --test cli_exit_codes
      - name: Build release binary for smoke
        run: |
          cargo build --locked --release --bin spotuify --no-default-features \
            --features "embedded-playback system-integrations loopback-cpal alsa-backend"
      - name: Run fake-provider CLI smoke
        run: SPOTUIFY_BIN=./target/release/spotuify scripts/smoke.sh

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: [plan]
    if: needs.plan.outputs.has_artifacts == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.apt_packages != ''
        shell: bash
        env:
          APT_PACKAGES: ${{ matrix.apt_packages }}
        run: |
          sudo apt-get update
          read -r -a packages <<< "$APT_PACKAGES"
          sudo apt-get install -y "${packages[@]}"

      - name: Install system dependencies (macOS)
        if: matrix.brew_packages != ''
        shell: bash
        env:
          BREW_PACKAGES: ${{ matrix.brew_packages }}
        run: |
          read -r -a packages <<< "$BREW_PACKAGES"
          brew install "${packages[@]}"

      - name: Build release binary
        shell: bash
        env:
          CARGO_TARGET: ${{ matrix.target }}
          AUDIO_FEATURE: ${{ matrix.audio }}
          EXTRA_FLAGS: ${{ matrix.extra_flags }}
        run: |
          cargo_args=(
            --locked
            --release
            --target "$CARGO_TARGET"
            --no-default-features
            --features "embedded-playback system-integrations loopback-cpal $AUDIO_FEATURE"
          )
          if [[ -n "$EXTRA_FLAGS" ]]; then
            read -r -a extra_args <<< "$EXTRA_FLAGS"
            cargo_args+=("${extra_args[@]}")
          fi
          cargo build "${cargo_args[@]}"

      # Developer-ID sign + notarize the macOS CLI binary so a tarball'd
      # binary downloaded via curl/brew is Gatekeeper-clean. Fully
      # guarded: with no signing secrets the binary ships unsigned (the
      # prior behaviour), so forks and unconfigured runs still release.
      # Required repo secrets to enable it:
      #   MACOS_SIGN_CERTIFICATE_BASE64  base64 of a "Developer ID Application" .p12
      #   MACOS_SIGN_CERTIFICATE_PASSWORD  the .p12 password
      #   MACOS_SIGN_IDENTITY            e.g. "Developer ID Application: Name (TEAMID)"
      #   MACOS_NOTARY_KEY_BASE64        base64 of an App Store Connect API key (.p8)
      #   MACOS_NOTARY_KEY_ID            the API key id
      #   MACOS_NOTARY_ISSUER_ID         the API key issuer UUID
      - name: Codesign + notarize CLI binary (macOS)
        if: matrix.platform_family == 'macos'
        shell: bash
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          MACOS_SIGN_CERTIFICATE_BASE64: ${{ secrets.MACOS_SIGN_CERTIFICATE_BASE64 }}
          MACOS_SIGN_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_SIGN_CERTIFICATE_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          BIN="target/${MATRIX_TARGET}/release/spotuify"
          if [[ -z "${MACOS_SIGN_CERTIFICATE_BASE64:-}" || -z "${MACOS_SIGN_IDENTITY:-}" ]]; then
            echo "==> macOS signing secrets not set; shipping the CLI binary unsigned."
            echo "    Set MACOS_SIGN_* / MACOS_NOTARY_* repo secrets for Gatekeeper-clean binaries."
            exit 0
          fi
          # Import the Developer ID cert into a throwaway keychain.
          KEYCHAIN="$RUNNER_TEMP/spotuify-signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -hex 20)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$MACOS_SIGN_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_SIGN_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          security default-keychain -s "$KEYCHAIN"
          # Sign with hardened runtime + a secure timestamp.
          codesign --force --options runtime --timestamp \
            --sign "$MACOS_SIGN_IDENTITY" "$BIN"
          codesign --verify --strict --verbose=2 "$BIN"
          # Notarize. A bare CLI binary can't be stapled, so Gatekeeper
          # verifies the ticket online; submit + wait is enough. Skipped
          # when the notary key isn't configured.
          if [[ -n "${MACOS_NOTARY_KEY_BASE64:-}" && -n "${MACOS_NOTARY_KEY_ID:-}" && -n "${MACOS_NOTARY_ISSUER_ID:-}" ]]; then
            echo "$MACOS_NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
            ditto -c -k --keepParent "$BIN" "$RUNNER_TEMP/spotuify-notarize.zip"
            xcrun notarytool submit "$RUNNER_TEMP/spotuify-notarize.zip" \
              --key "$RUNNER_TEMP/notary.p8" \
              --key-id "$MACOS_NOTARY_KEY_ID" \
              --issuer "$MACOS_NOTARY_ISSUER_ID" \
              --wait
            rm -f "$RUNNER_TEMP/notary.p8" "$RUNNER_TEMP/spotuify-notarize.zip"
            echo "==> notarized $BIN"
          else
            echo "==> signed but not notarized (MACOS_NOTARY_* secrets not set)."
          fi
          rm -f "$RUNNER_TEMP/cert.p12"
          security delete-keychain "$KEYCHAIN"

      - name: Package CLI archive (unix)
        if: matrix.archive_kind == 'tar'
        shell: bash
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          MATRIX_ARCHIVE: ${{ matrix.archive }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ARCHIVE="spotuify-v${VERSION}-${MATRIX_ARCHIVE}"
          mkdir -p release
          cp "target/${MATRIX_TARGET}/release/spotuify" release/
          cp install.sh release/
          cp README.md release/
          cp -r install release/install 2>/dev/null || true
          cp -r docs/recipes release/recipes 2>/dev/null || true
          tar czf "${ARCHIVE}" -C release .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package CLI archive (windows)
        if: matrix.archive_kind == 'zip'
        shell: pwsh
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          MATRIX_ARCHIVE: ${{ matrix.archive }}
        run: |
          $version = $env:GITHUB_REF -replace '^refs/tags/v', ''
          $archive = "spotuify-v$version-$env:MATRIX_ARCHIVE"
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "target/$env:MATRIX_TARGET/release/spotuify.exe" release/
          Copy-Item install.sh release/
          Copy-Item README.md release/
          Copy-Item install release/install -Recurse -ErrorAction SilentlyContinue
          Compress-Archive -Path "release/*" -DestinationPath $archive -Force
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Generate CLI SHA256 checksum
        shell: bash
        run: |
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

      - name: Attest CLI archive provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target }}-cli
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [plan, release-smoke, build-binaries]
    # The macOS DMG is built locally (the app needs the macOS 26 SDK, which CI
    # runners don't have) and attached to the release manually — see
    # clients/macos/scripts/build-dmg.sh. CI ships binaries + Homebrew.
    if: >-
      always()
      && needs.plan.result == 'success'
      && (needs.release-smoke.result == 'success' || needs.release-smoke.result == 'skipped')
      && (needs.build-binaries.result == 'success'
        || (needs.plan.outputs.has_artifacts != 'true' && needs.build-binaries.result == 'skipped'))
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: needs.build-binaries.result == 'success'
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify release artifact checksums
        if: needs.build-binaries.result == 'success'
        run: scripts/verify_release_checksums.sh artifacts

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        if: needs.build-binaries.result == 'success'
        with:
          files: artifacts/*
          generate_release_notes: true
          overwrite_files: false

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        if: needs.build-binaries.result == 'skipped'
        with:
          generate_release_notes: true

  homebrew:
    name: Homebrew Formula
    runs-on: ubuntu-latest
    needs: [plan, github-release]
    if: needs.plan.outputs.cli_changed == 'true' && needs.github-release.result == 'success'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Verify release artifact checksums
        run: scripts/verify_release_checksums.sh artifacts
      - name: Render formula
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          bash ./scripts/render_homebrew_formula.sh "$VERSION" artifacts Formula/spotuify.rb
      - name: Update tap formula
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$COMMITTER_TOKEN" ]; then
            echo "::error ::HOMEBREW_TAP_TOKEN is required to update the Homebrew tap."
            exit 1
          fi
          VERSION="${GITHUB_REF#refs/tags/v}"
          git clone "https://x-access-token:${COMMITTER_TOKEN}@github.com/planetaryescape/homebrew-spotuify.git" tap
          cp Formula/spotuify.rb tap/Formula/spotuify.rb
          if git -C tap diff --quiet -- Formula/spotuify.rb; then
            echo "No Homebrew formula changes"
            exit 0
          fi
          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C tap add Formula/spotuify.rb
          git -C tap commit -m "spotuify ${VERSION}"
          git -C tap push origin HEAD:main
      - uses: Homebrew/actions/setup-homebrew@6eaeff80e7e5c43087c0e5eb5aa82120399e9c91 # master
      - name: Install bubblewrap (Homebrew Linux sandbox)
        # Homebrew on Linux now refuses to install without bubblewrap
        # for its build sandbox — broke the verify step on v0.1.60.
        run: sudo apt-get update && sudo apt-get install -y bubblewrap
      - name: Verify Homebrew install
        env:
          # ubuntu-latest's AppArmor blocks rootless bubblewrap (broke
          # the verify on v0.1.62 even with bubblewrap installed). The
          # sandbox protects nothing on a throwaway smoke runner.
          HOMEBREW_NO_SANDBOX_LINUX: "1"
        run: |
          brew update
          brew tap planetaryescape/spotuify
          brew trust --formula planetaryescape/spotuify/spotuify
          HOMEBREW_REQUIRE_TAP_TRUST=1 brew install planetaryescape/spotuify/spotuify
          spotuify --version
