name: Release

on:
  push:
    tags:
      - "v*"
  # Manual trigger can re-run an existing tag release. Select the tag ref
  # (for example `v0.1.0`) when dispatching.
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: spotuify

jobs:
  plan:
    name: Plan Release
    runs-on: ubuntu-latest
    outputs:
      cli_changed: ${{ steps.scope.outputs.cli_changed }}
      has_artifacts: ${{ steps.scope.outputs.has_artifacts }}
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate release ref
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+(\.[0-9]+)* ]]; then
            echo "::error ::release workflow must run on a v* tag, got ${GITHUB_REF_NAME}"
            exit 1
          fi
      - id: previous-tag
        name: Find previous tag
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-version:refname | grep '^v' | grep -Fxv "${CURRENT_TAG}" | head -n1 || true)"
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
      - id: scope
        name: Detect changed artifact families
        run: bash ./scripts/release_change_scope.sh "${{ steps.previous-tag.outputs.previous_tag }}" "${GITHUB_REF_NAME}"
      - id: matrix
        name: Build release matrix
        run: |
          MATRIX='{"include":[
            {"os":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu","platform_family":"linux","archive":"linux-x86_64.tar.gz","archive_kind":"tar","audio":"alsa-backend","extra_flags":"","apt_packages":"libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config","brew_packages":""},
            {"os":"macos-15","target":"aarch64-apple-darwin","platform_family":"macos","archive":"macos-aarch64.tar.gz","archive_kind":"tar","audio":"portaudio-backend","extra_flags":"","apt_packages":"","brew_packages":"portaudio pkg-config"},
            {"os":"macos-15-intel","target":"x86_64-apple-darwin","platform_family":"macos","archive":"macos-x86_64.tar.gz","archive_kind":"tar","audio":"portaudio-backend","extra_flags":"","apt_packages":"","brew_packages":"portaudio pkg-config"}
          ]}'
          {
            echo 'build_matrix<<EOF'
            echo "${MATRIX}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  release-smoke:
    name: Release CLI Smoke
    runs-on: ubuntu-24.04
    needs: plan
    if: needs.plan.outputs.cli_changed == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config
      - name: Run release-blocking CLI tests
        run: scripts/cargo-test --test cli_help --test cli_fake_daemon --test cli_exit_codes
      - name: Build release binary for smoke
        run: |
          cargo build --locked --release --bin spotuify --no-default-features \
            --features "embedded-playback system-integrations loopback-cpal alsa-backend"
      - name: Run fake-provider CLI smoke
        run: SPOTUIFY_BIN=./target/release/spotuify scripts/smoke.sh

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: [plan]
    if: needs.plan.outputs.has_artifacts == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.apt_packages != ''
        shell: bash
        env:
          APT_PACKAGES: ${{ matrix.apt_packages }}
        run: |
          sudo apt-get update
          read -r -a packages <<< "$APT_PACKAGES"
          sudo apt-get install -y "${packages[@]}"

      - name: Install system dependencies (macOS)
        if: matrix.brew_packages != ''
        shell: bash
        env:
          BREW_PACKAGES: ${{ matrix.brew_packages }}
        run: |
          read -r -a packages <<< "$BREW_PACKAGES"
          brew install "${packages[@]}"

      - name: Build release binary
        shell: bash
        env:
          CARGO_TARGET: ${{ matrix.target }}
          AUDIO_FEATURE: ${{ matrix.audio }}
          EXTRA_FLAGS: ${{ matrix.extra_flags }}
        run: |
          cargo_args=(
            --locked
            --release
            --target "$CARGO_TARGET"
            --no-default-features
            --features "embedded-playback system-integrations loopback-cpal $AUDIO_FEATURE"
          )
          if [[ -n "$EXTRA_FLAGS" ]]; then
            read -r -a extra_args <<< "$EXTRA_FLAGS"
            cargo_args+=("${extra_args[@]}")
          fi
          cargo build "${cargo_args[@]}"

      - name: Package CLI archive (unix)
        if: matrix.archive_kind == 'tar'
        shell: bash
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          MATRIX_ARCHIVE: ${{ matrix.archive }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ARCHIVE="spotuify-v${VERSION}-${MATRIX_ARCHIVE}"
          mkdir -p release
          cp "target/${MATRIX_TARGET}/release/spotuify" release/
          cp README.md release/
          cp -r install release/install 2>/dev/null || true
          cp -r docs/recipes release/recipes 2>/dev/null || true
          tar czf "${ARCHIVE}" -C release .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package CLI archive (windows)
        if: matrix.archive_kind == 'zip'
        shell: pwsh
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          MATRIX_ARCHIVE: ${{ matrix.archive }}
        run: |
          $version = $env:GITHUB_REF -replace '^refs/tags/v', ''
          $archive = "spotuify-v$version-$env:MATRIX_ARCHIVE"
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "target/$env:MATRIX_TARGET/release/spotuify.exe" release/
          Copy-Item README.md release/
          Copy-Item install release/install -Recurse -ErrorAction SilentlyContinue
          Compress-Archive -Path "release/*" -DestinationPath $archive -Force
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Generate CLI SHA256 checksum
        shell: bash
        run: |
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-cli
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [plan, release-smoke, build-binaries]
    if: >-
      always()
      && needs.plan.result == 'success'
      && (needs.release-smoke.result == 'success' || needs.release-smoke.result == 'skipped')
      && (needs.build-binaries.result == 'success'
        || (needs.plan.outputs.has_artifacts != 'true' && needs.build-binaries.result == 'skipped'))
    steps:
      - uses: actions/download-artifact@v8
        if: needs.build-binaries.result == 'success'
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3.0.0
        if: needs.build-binaries.result == 'success'
        with:
          files: artifacts/*
          generate_release_notes: true
          overwrite_files: false

      - uses: softprops/action-gh-release@v3.0.0
        if: needs.build-binaries.result == 'skipped'
        with:
          generate_release_notes: true

  homebrew:
    name: Homebrew Formula
    runs-on: ubuntu-latest
    needs: [plan, github-release]
    if: needs.plan.outputs.cli_changed == 'true' && needs.github-release.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Render formula
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          bash ./scripts/render_homebrew_formula.sh "$VERSION" artifacts Formula/spotuify.rb
      - name: Update tap formula
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$COMMITTER_TOKEN" ]; then
            echo "::error ::HOMEBREW_TAP_TOKEN is required to update the Homebrew tap."
            exit 1
          fi
          VERSION="${GITHUB_REF#refs/tags/v}"
          git clone "https://x-access-token:${COMMITTER_TOKEN}@github.com/planetaryescape/homebrew-spotuify.git" tap
          cp Formula/spotuify.rb tap/Formula/spotuify.rb
          if git -C tap diff --quiet -- Formula/spotuify.rb; then
            echo "No Homebrew formula changes"
            exit 0
          fi
          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C tap add Formula/spotuify.rb
          git -C tap commit -m "spotuify ${VERSION}"
          git -C tap push origin HEAD:main
      - uses: Homebrew/actions/setup-homebrew@master
      - name: Verify Homebrew install
        run: |
          brew update
          brew install planetaryescape/spotuify/spotuify
          spotuify --version
