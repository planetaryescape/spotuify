name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      docs: ${{ steps.filter.outputs.docs }}
      site: ${{ steps.filter.outputs.site }}
      expensive: ${{ steps.filter.outputs.expensive }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          rust=false
          docs=false
          site=false
          expensive=false

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            rust=true
            docs=true
            site=true
            expensive=true
          else
            if [[ "${EVENT_NAME}" == "pull_request" ]]; then
              base="${PR_BASE_SHA}"
              head="HEAD"
            else
              base="${BEFORE}"
              head="${SHA}"
            fi

            if [[ -z "${base}" || "${base}" =~ ^0+$ ]]; then
              rust=true
              docs=true
            else
              while IFS= read -r path; do
                [[ -z "${path}" ]] && continue
                case "${path}" in
                  Cargo.toml|Cargo.lock|rust-toolchain*|build.rs|src/*|crates/*|tests/*)
                    rust=true
                    ;;
                  deny.toml)
                    rust=true
                    ;;
                  scripts/cargo-test|scripts/smoke.sh|scripts/test_quality_audit.sh|scripts/test_quality_audit_test.sh|scripts/release_change_scope.sh|scripts/release_change_scope_test.sh|scripts/render_homebrew_formula.sh)
                    rust=true
                    ;;
                  .github/workflows/ci.yml|.github/workflows/release.yml|.github/workflows/release-please.yml|.github/workflows/release-lockfile.yml|release-please-config.json|.release-please-manifest.json)
                    rust=true
                    site=true
                    ;;
                  site/*)
                    site=true
                    ;;
                  packaging/homebrew/*|install/*)
                    rust=true
                    ;;
                  docs/*|README.md|AGENTS.md)
                    docs=true
                    ;;
                esac
              done < <(git diff --name-only "${base}" "${head}")
            fi
          fi

          {
            echo "rust=${rust}"
            echo "docs=${docs}"
            echo "site=${site}"
            echo "expensive=${expensive}"
          } >> "${GITHUB_OUTPUT}"

  check:
    name: Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config
      - run: cargo check --workspace --all-targets --locked

  architecture:
    name: Architecture Boundaries
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config
      - run: scripts/cargo-test --test workspace_boundaries

  fmt:
    name: Format
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config
      - name: Clippy production targets
        run: cargo clippy --workspace --locked -- -D warnings
      - name: Clippy test targets
        run: cargo clippy --workspace --tests --locked -- -D warnings -A clippy::panic -A clippy::unwrap_used

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@23c1afe4238f0421bd35351b5c0a6d40ceef5283 # nextest
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config
      - run: cargo nextest run --workspace

  dependency-audit:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config
      - uses: taiki-e/install-action@41a263fd29c9f4050f88d60db4ffc739c042463a # cargo-deny
      - run: cargo deny check advisories licenses

  site:
    name: Site Audit & Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.site == 'true' || needs.changes.outputs.expensive == 'true'
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=moderate
      - run: npm run build

  cli-smoke:
    name: Fake Provider CLI Smoke
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config
      - name: Build smoke binary
        run: |
          cargo build --locked --release --bin spotuify --no-default-features \
            --features "embedded-playback system-integrations loopback-cpal alsa-backend"
      - run: SPOTUIFY_BIN=./target/release/spotuify scripts/smoke.sh

  windows:
    name: Windows x64
    runs-on: windows-2025
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    env:
      RUSTFLAGS: ""
      WINDOWS_FEATURES: embedded-playback system-integrations loopback-cpal rodio-backend
      WINDOWS_TARGET: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ env.WINDOWS_TARGET }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: windows-${{ env.WINDOWS_TARGET }}
      - name: Check Windows target
        run: cargo check --locked --target "$env:WINDOWS_TARGET" --all-targets --no-default-features --features "$env:WINDOWS_FEATURES"
      - name: Test Windows target
        timeout-minutes: 20
        run: cargo test --locked --target "$env:WINDOWS_TARGET" --no-default-features --features "$env:WINDOWS_FEATURES" -- --test-threads=1
      - name: Build Windows smoke binary
        timeout-minutes: 10
        run: cargo build --locked --bin spotuify --target "$env:WINDOWS_TARGET" --no-default-features --features "$env:WINDOWS_FEATURES"
      - name: Run Windows fake-provider smoke
        timeout-minutes: 10
        run: |
          $env:SPOTUIFY_BIN = "target/$env:WINDOWS_TARGET/debug/spotuify.exe"
          bash scripts/smoke.sh

  test-quality-audit:
    name: Test Quality Audit (non-blocking)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install audit dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: scripts/test_quality_audit_test.sh
      - run: scripts/test_quality_audit.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-quality-audit
          path: target/test-quality

  test-quality-gate:
    name: Test Quality Gate (changed files)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Install audit dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: scripts/test_quality_audit_test.sh
      - run: scripts/test_quality_audit.sh --strict --changed-only --base-ref origin/${{ github.base_ref }}

  release-scripts:
    name: Release Script Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: scripts/release_change_scope_test.sh

  build:
    name: Release Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            audio: alsa-backend
            apt_packages: libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config
            brew_packages: ""
          - os: macos-15
            target: aarch64-apple-darwin
            audio: portaudio-backend
            apt_packages: ""
            brew_packages: portaudio pkg-config
          - os: macos-15-intel
            target: x86_64-apple-darwin
            audio: portaudio-backend
            apt_packages: ""
            brew_packages: portaudio pkg-config
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ci-build-${{ matrix.target }}
      - name: Install system packages (Linux)
        if: matrix.apt_packages != ''
        shell: bash
        env:
          APT_PACKAGES: ${{ matrix.apt_packages }}
        run: |
          sudo apt-get update
          read -r -a packages <<< "$APT_PACKAGES"
          sudo apt-get install -y "${packages[@]}"
      - name: Install system packages (macOS)
        if: matrix.brew_packages != ''
        shell: bash
        env:
          BREW_PACKAGES: ${{ matrix.brew_packages }}
        run: |
          read -r -a packages <<< "$BREW_PACKAGES"
          brew install "${packages[@]}"
      - name: Build release binary
        shell: bash
        env:
          CARGO_TARGET: ${{ matrix.target }}
          AUDIO_FEATURE: ${{ matrix.audio }}
        run: |
          cargo build --locked --release --target "$CARGO_TARGET" --no-default-features \
            --features "embedded-playback system-integrations loopback-cpal $AUDIO_FEATURE"

  rustdoc:
    name: Rustdoc
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    env:
      RUSTDOCFLAGS: -Dwarnings
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config
      - run: cargo doc --workspace --no-deps

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.88
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config
      - run: cargo check --workspace --locked

  install-check:
    name: Install Smoke Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse-dev libpipewire-0.3-dev libdbus-1-dev pkg-config
      - run: cargo install --path . --locked --root "$RUNNER_TEMP/spotuify-install"
      - run: |
          "$RUNNER_TEMP/spotuify-install/bin/spotuify" --version
